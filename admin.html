<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/admin.css">
</head>
<body>

<!-- ── Login overlay ──────────────────────────────────────────────────────── -->
<div id="login-overlay">
  <div class="login-card">
    <h2>⚙ Admin Access</h2>
    <p>Enter your passphrase to unlock the dashboard</p>
    <input
      type="password"
      id="passphrase-input"
      placeholder="Passphrase"
      autocomplete="current-password"
    >
    <button id="login-submit">Unlock</button>
    <div id="login-error"></div>
    <div id="lockout-countdown"></div>
    <div class="attempt-dots" id="attempt-dots"></div>
  </div>
</div>

<!-- ── Dashboard (hidden until login) ────────────────────────────────────── -->
<div id="main-content" style="display:none;">

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="loading" style="display:none;" aria-live="polite">Loading…</div>
  <div id="sidebar-overlay"></div>

  <!-- Sidebar nav -->
  <nav class="sidebar" aria-label="Dashboard navigation">
    <ul id="nav-links">
      <li><a href="#" data-section="about" class="active">About</a></li>
      <li><a href="#" data-section="services-about">Services (About)</a></li>
      <li><a href="#" data-section="education">Education</a></li>
      <li><a href="#" data-section="experience">Experience</a></li>
      <li><a href="#" data-section="skills">Skills</a></li>
      <li><a href="#" data-section="services-page">Services Page</a></li>
      <li><a href="#" data-section="projects">Projects</a></li>
      <li><a href="#" data-section="blog">Blog</a></li>
    </ul>
  </nav>

  <!-- Header -->
  <header class="dashboard-header">
    <span id="session-timer" aria-live="polite"></span>
    <button id="actions-hamburger" aria-label="Toggle menu" aria-expanded="false">&#9776;</button>
    <nav id="header-menu" aria-label="Header actions">
      <a href="#" id="menu-reload">↺ Reload</a>
      <a href="#" id="menu-logout">⏻ Logout</a>
    </nav>
  </header>

  <!-- Bottom nav (mobile) -->
  <nav id="bottom-nav" aria-label="Mobile navigation"></nav>

  <!-- Sections -->
  <main>
    <div id="section-about"          class="section active"></div>
    <div id="section-services-about" class="section"></div>
    <div id="section-education"      class="section"></div>
    <div id="section-experience"     class="section"></div>
    <div id="section-skills"         class="section"></div>
    <div id="section-services-page"  class="section"></div>
    <div id="section-projects"       class="section"></div>
    <div id="section-blog"           class="section"></div>
  </main>

</div><!-- /#main-content -->

<script src="./assets/js/admin.js" defer></script>
<script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
